name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.29'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - run: uv sync --frozen --group dev
      - run: uv run --frozen -- pytest -m 'not live'
      - run: uv run --frozen -- ruff check .
      - run: uv run --frozen -- ruff format --check .
      - run: uv run --frozen -- mypy mycli_lite.py tests

      - name: Require tag to match module version
        run: |
          version=$(uv run --frozen -- python -c 'import mycli_lite; print(mycli_lite.__version__)')
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Build distributions and checksums
        run: |
          uv build
          sha256sum mycli_lite.py LICENSE.txt ATTRIBUTION.md > SHA256SUMS
          (cd dist && sha256sum * >> ../SHA256SUMS)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            dist/*
            mycli_lite.py
            LICENSE.txt
            ATTRIBUTION.md
            SHA256SUMS
          if-no-files-found: error

  release-assets:
    name: Attach standalone artifact
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts
          path: release-artifacts
      - name: Upload files to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            release-artifacts/mycli_lite.py \
            release-artifacts/LICENSE.txt \
            release-artifacts/ATTRIBUTION.md \
            release-artifacts/SHA256SUMS \
            release-artifacts/dist/* \
            --clobber
