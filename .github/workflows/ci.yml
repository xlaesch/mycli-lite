name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.29'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: uv sync --frozen --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run --frozen --python ${{ matrix.python-version }} -- pytest -m 'not live'

      - name: Test the standalone artifact
        run: |
          uv run --frozen --python ${{ matrix.python-version }} -- python -I -S mycli_lite.py --version
          uv run --frozen --python ${{ matrix.python-version }} -- python -I -S mycli_lite.py --help >/dev/null

  quality-and-build:
    name: Quality and distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.29'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - run: uv sync --frozen --group dev
      - run: uv run --frozen -- ruff check .
      - run: uv run --frozen -- ruff format --check .
      - run: uv run --frozen -- mypy mycli_lite.py tests
      - run: uv build

      - name: Verify wheel contents and dependencies
        run: |
          wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          unzip -Z1 "$wheel"
          if unzip -p "$wheel" '*/METADATA' | grep -q '^Requires-Dist:'; then
            echo 'Wheel unexpectedly declares a runtime dependency.' >&2
            exit 1
          fi
          if unzip -Z1 "$wheel" | grep -Ev '^(mycli_lite\.py|mycli_lite-[^/]+\.dist-info/([^/]+|licenses/(LICENSE\.txt|ATTRIBUTION\.md)))$'; then
            echo 'Wheel contains an unexpected file.' >&2
            exit 1
          fi

      - name: Install and run the wheel
        run: |
          uv venv .wheel-venv --python 3.14
          uv pip install --python .wheel-venv/bin/python --no-deps dist/*.whl
          .wheel-venv/bin/mycli-lite --version

  live-mysql:
    name: Live MySQL 8.0 smoke test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ROOT_HOST: '%'
          MYSQL_DATABASE: mycli_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --host=127.0.0.1 --user=root --password=root --silent"
          --health-interval=2s
          --health-timeout=2s
          --health-retries=60

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.29'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
      - run: uv sync --frozen --group dev
      - name: Run live protocol smoke test
        env:
          MYCLI_LITE_TEST_HOST: 127.0.0.1
          MYCLI_LITE_TEST_PORT: '3306'
          MYCLI_LITE_TEST_USER: root
          MYCLI_LITE_TEST_PASSWORD: root
          MYCLI_LITE_TEST_DATABASE: mycli_test
          MYCLI_LITE_TEST_GET_SERVER_PUBLIC_KEY: '1'
        run: uv run --frozen -- pytest -m live
